name: Rotate Easy Auth client secret

# Runs twice a year (on the 1st of every 6th month at 02:00 UTC) and
# on-demand via workflow_dispatch. Rotates the Easy Auth client secret
# on the Library-Patrons app registration and writes the new value to
# Key Vault. App Service picks it up via the KV reference within ~24h.
#
# The booktracker-ci OIDC service principal does the work — it must have
# been granted Application.ReadWrite.OwnedBy (Graph) + owner of the
# Library-Patrons app registration + Key Vault Secrets Officer on the
# vault. infra/setup-github-oidc.ps1 is the canonical place that grants
# all three; re-run it if permissions drift.

on:
  schedule:
    - cron: '0 2 1 */6 *'  # 02:00 UTC, 1st of every 6th month
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: rotate-easy-auth
  cancel-in-progress: false

env:
  APP_REG_NAME: Library-Patrons

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Install-Module Az.KeyVault -Force -Scope CurrentUser -AllowClobber -Repository PSGallery
          Install-Module Microsoft.Graph.Applications -Force -Scope CurrentUser -AllowClobber -Repository PSGallery

      - name: Rotate secret
        shell: pwsh
        run: |
          ./infra/rotate-easy-auth-secret.ps1 `
            -TenantId '${{ vars.AZURE_TENANT_ID }}' `
            -SubscriptionId '${{ vars.AZURE_SUBSCRIPTION_ID }}' `
            -ResourceGroupName '${{ vars.AZURE_RG }}' `
            -AppRegistrationDisplayName '${{ env.APP_REG_NAME }}'
