version: 2

updates:
  # NuGet packages (C#)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      ef-core:
        patterns:
          - "Microsoft.EntityFrameworkCore*"

  # npm packages (vendored JS libraries like html5-qrcode)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
