services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: booktracker-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-BookTracker!Dev1}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - booktracker-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Azurite — Azure Storage emulator. Used by the IBookCoverStorage local-dev
  # implementation so dev parity matches prod (single Azure.Storage.Blobs code
  # path either way). Persists blobs to ./azurite-data/ on the host so book
  # covers survive container restarts; bind-mount keeps the data inspectable.
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: booktracker-azurite
    command: "azurite-blob --blobHost 0.0.0.0 --location /data --skipApiVersionCheck"
    ports:
      - "10000:10000"
    volumes:
      - ./azurite-data:/data

volumes:
  booktracker-db-data:
