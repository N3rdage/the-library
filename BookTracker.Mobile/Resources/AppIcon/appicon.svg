<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Bookshelf app icon — background layer.

  Adaptive-icon background for Android. Solid espresso (#3E2723) —
  the same colour as the in-app MainPage header banner. Differentiates
  Bookshelf from the Bookcase PWA (Material You purple) on a phone
  where both apps are installed: the launcher icon at a glance reads
  as "the mobile one" rather than visually competing with the web app's
  shortcut. The foreground design (spine + text lines) in appiconfg.svg
  picks up the leather + brass + parchment palette so the icon family
  stays cohesive with the in-app chrome.
-->
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="456" height="456" fill="#3E2723" />
</svg>
