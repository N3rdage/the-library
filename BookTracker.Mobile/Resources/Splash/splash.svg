<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Bookshelf splash screen.

  Same icon design used in the AppIcon foreground (book spine + text
  lines), rendered at original 512x512 scale. The MauiSplashScreen
  Color="#3E2723" in the csproj sets the surrounding screen fill to
  espresso so the splash visually echoes the launcher icon while the
  app starts up. Splash isn't safe-zone constrained, so the content
  uses the full canvas.
-->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <rect x="96" y="72" width="96" height="368" fill="#A67B3A" />
    <line x1="208" y1="170" x2="400" y2="170" stroke="#F2EADB" stroke-width="14" stroke-linecap="round" />
    <line x1="208" y1="250" x2="400" y2="250" stroke="#F2EADB" stroke-width="14" stroke-linecap="round" />
    <line x1="208" y1="330" x2="348" y2="330" stroke="#F2EADB" stroke-width="14" stroke-linecap="round" />
</svg>
